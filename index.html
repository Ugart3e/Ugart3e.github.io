<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Buscador de Pokémon</title>
  <link rel="stylesheet" href="styles.css">
  <script src="script.js" defer></script>
</head>
<body>

  <div id="header">
    <h1>Buscador de Pokémon</h1>
    <div id="pokemon-search-container">
      <div id="pokemon-search">
        <label for="pokemon-name">Buscar Pokémon:</label>
        <input type="text" id="pokemon-name" placeholder="Nombre del Pokémon" autocomplete="off">
        <div id="pokemon-list"></div>
      </div>
      <button onclick="searchPokemon()">Buscar</button>
    </div>
  </div>

  <div id="buttons-container">
    <button onclick="prevPokemon()">Anterior</button>
    <button onclick="nextPokemon()">Siguiente</button>
  </div>

  <div id="pokemon-cards">
    <div id="previous-pokemon" class="main-card"></div>
    <div id="current-pokemon" class="main-card"></div>
    <div id="next-pokemon" class="main-card"></div>
  </div>

</body>
</html>
